name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Produces: Docker images in GHCR (app + worker) tagged with the version, and a
# GitHub Release entry (which the in-app update check reads via the Releases API).
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push images to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: web
          target: runner
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            APP_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: web
          target: worker
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            APP_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}-worker:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}-worker:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
