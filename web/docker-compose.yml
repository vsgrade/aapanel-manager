# Compose: Postgres + migrate (one-shot) + app.
#
# Start order:
#   postgres (health-checked) → migrate (one-shot) → app
#
# Usage:
#   cp .env.example .env   # fill in DATABASE_URL, AUTH_SECRET, APP_ENCRYPTION_KEY …
#   docker compose up --build
#
# The `migrate` service runs `pnpm prisma migrate deploy` once and exits (restart: no).
# `app` waits for it to complete successfully before starting.
#
# The app polls aaPanel servers in-process (see src/instrumentation.ts). A
# Postgres advisory lock makes it safe to scale `app` to several replicas —
# exactly one of them polls. No separate worker service is required.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: aapanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: aapanel_manager
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aapanel -d aapanel_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── One-shot migration runner ────────────────────────────────────────────────
  # Uses the `worker` build stage which has the full source tree + prisma CLI.
  # Exits with code 0 on success; app + worker will not start until it succeeds.
  migrate:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      NODE_ENV: production
    command: ["pnpm", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Web application ──────────────────────────────────────────────────────────
  # Runs the Next.js standalone server (node server.js).
  # Waits for migrations to complete before starting so the schema is in place.
  app:
    build:
      context: .
      target: runner
    env_file: .env
    environment:
      NODE_ENV: production
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "server.js"]
    restart: unless-stopped

volumes:
  pgdata:
